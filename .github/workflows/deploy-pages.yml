# GitHub Pages 배포 — site/ 를 taiyoungkim.github.io/AshitaKanji/ 로 게시.
# release-gate.mjs 가 검사하는 URL(/, /privacy/, /support/) 을 HTTP 200 으로 만든다.
#
# 활성화: 저장소 Settings → Pages → Source = "GitHub Actions" 1회 설정 후 main push.
name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 (중복 실행 취소).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v4
